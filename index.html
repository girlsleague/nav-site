<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>E1nstein 导航站 · 工具与灵感</title>
<meta name="description" content="E1nstein 的个人导航站，收录精选工具、开发资源与创意灵感">
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f7fa;--surface:#fff;--surface2:#f0f2f5;
  --text:#1a1a2e;--text2:#555;
  --accent:#6366f1;--accent-hover:#4f46e5;--accent-light:#eef2ff;
  --border:#e2e5ed;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --radius:12px;--radius-sm:8px;
  --font:'Inter','SF Pro','-apple-system',BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --mono:'JetBrains Mono','SF Mono','Fira Code',monospace;
}
.dark{
  --bg:#0f0f1a;--surface:#1a1a2e;--surface2:#252540;
  --text:#e8e8f0;--text2:#999;
  --accent:#818cf8;--accent-hover:#6366f1;--accent-light:#1e1e3a;
  --border:#2d2d45;--shadow:0 1px 3px rgba(0,0,0,.3);
}
html{scroll-behavior:smooth}
body{
  font-family:var(--font);background:var(--bg);color:var(--text);
  min-height:100vh;transition:background .3s,color .3s;
  -webkit-font-smoothing:antialiased;
}
a{color:var(--accent);text-decoration:none}
a:hover{color:var(--accent-hover)}
::selection{background:var(--accent);color:#fff}

/* ===== Scrollbar ===== */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* ===== Header ===== */
header{
  position:sticky;top:0;z-index:100;
  backdrop-filter:blur(16px) saturate(180%);
  -webkit-backdrop-filter:blur(16px) saturate(180%);
  background:rgba(245,247,250,.8);
  border-bottom:1px solid var(--border);
}
.dark header{background:rgba(15,15,26,.8)}
.header-inner{
  max-width:1100px;margin:0 auto;padding:14px 24px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.logo{
  display:flex;align-items:center;gap:10px;
  font-weight:700;font-size:1.2rem;white-space:nowrap;
}
.logo-icon{
  width:34px;height:34px;border-radius:10px;
  background:linear-gradient(135deg,var(--accent),#a78bfa);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:1rem;
}
.header-actions{display:flex;align-items:center;gap:12px}
.theme-btn{
  background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);
  width:36px;height:36px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text);font-size:1.1rem;transition:all .2s;
}
.theme-btn:hover{background:var(--accent-light)}

/* ===== Hero ===== */
.hero{
  text-align:center;padding:60px 24px 30px;max-width:700px;margin:0 auto;
}
.hero h1{font-size:2.4rem;font-weight:800;letter-spacing:-.03em;margin-bottom:12px}
.hero h1 span{background:linear-gradient(135deg,var(--accent),#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{color:var(--text2);font-size:1.05rem;line-height:1.7}

/* ===== Search ===== */
.search-wrap{max-width:560px;margin:0 auto 40px;padding:0 24px}
.search-box{
  display:flex;align-items:center;gap:10px;
  background:var(--surface);border:1.5px solid var(--border);border-radius:12px;
  padding:12px 18px;transition:all .25s;box-shadow:var(--shadow);
}
.search-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 4px var(--accent-light)}
.search-box .icon{color:var(--text2);font-size:1.1rem;flex-shrink:0}
.search-box input{
  flex:1;border:none;outline:none;background:transparent;
  font-size:.95rem;color:var(--text);font-family:var(--font);
}
.search-box input::placeholder{color:var(--text2)}
.search-clear{
  background:none;border:none;color:var(--text2);cursor:pointer;font-size:1rem;
  padding:2px 6px;border-radius:4px;display:none;
}
.search-clear.visible{display:block}
.search-clear:hover{background:var(--surface2)}

/* ===== Categories ===== */
.container{max-width:1100px;margin:0 auto;padding:0 24px 60px}
.cat-filter{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:36px;
}
.cat-btn{
  padding:8px 18px;border-radius:20px;border:1.5px solid var(--border);
  background:var(--surface);color:var(--text2);cursor:pointer;
  font-size:.85rem;font-weight:500;transition:all .2s;font-family:var(--font);
}
.cat-btn:hover{border-color:var(--accent);color:var(--accent)}
.cat-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.cat-btn .count{
  display:inline-block;background:var(--surface2);color:var(--text2);
  font-size:.7rem;padding:0 6px;border-radius:8px;margin-left:4px;
}
.cat-btn.active .count{background:rgba(255,255,255,.2);color:#fff}

/* ===== Section ===== */
.section{margin-bottom:40px}
.section-title{
  display:flex;align-items:center;gap:10px;
  font-size:1.15rem;font-weight:600;margin-bottom:16px;padding-bottom:10px;
  border-bottom:2px solid var(--border);
}
.section-title .emoji{font-size:1.3rem}

/* ===== Link Grid ===== */
.link-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;
}
.link-card{
  display:flex;align-items:center;gap:14px;
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:14px 18px;transition:all .2s;cursor:pointer;
  position:relative;overflow:hidden;
}
.link-card:hover{
  border-color:var(--accent);transform:translateY(-2px);
  box-shadow:0 4px 12px rgba(99,102,241,.1);
}
.link-card:active{transform:translateY(0)}
.link-icon{
  width:40px;height:40px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.2rem;flex-shrink:0;
  background:var(--accent-light);color:var(--accent);
}
.link-info{flex:1;min-width:0}
.link-info .name{
  font-weight:600;font-size:.9rem;display:block;margin-bottom:2px;
}
.link-info .desc{
  font-size:.78rem;color:var(--text2);
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;
}
.link-info .tag{
  display:inline-block;font-size:.68rem;background:var(--surface2);
  color:var(--text2);padding:1px 8px;border-radius:4px;margin-top:4px;
}
.link-arrow{color:var(--text2);font-size:.8rem;transition:all .2s;flex-shrink:0}
.link-card:hover .link-arrow{color:var(--accent);transform:translateX(3px)}
.link-card.hidden{display:none}

/* ===== Tools Section ===== */
.tools-grid{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;
}
.tool-card{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
  padding:20px;text-align:center;cursor:pointer;transition:all .2s;
}
.tool-card:hover{
  border-color:var(--accent);transform:translateY(-2px);
  box-shadow:0 4px 12px rgba(99,102,241,.1);
}
.tool-card .icon{font-size:2rem;margin-bottom:8px}
.tool-card .name{font-weight:600;font-size:.9rem;margin-bottom:4px}
.tool-card .desc{font-size:.78rem;color:var(--text2)}
.tool-card.hidden{display:none}

/* ===== Footer ===== */
footer{
  text-align:center;padding:32px 24px;color:var(--text2);font-size:.82rem;
  border-top:1px solid var(--border);margin-top:20px;
}
footer a{color:var(--accent)}

/* ===== Responsive ===== */
@media(max-width:640px){
  .header-inner{padding:12px 16px}
  .hero{padding:40px 16px 20px}
  .hero h1{font-size:1.8rem}
  .link-grid{grid-template-columns:1fr}
  .tools-grid{grid-template-columns:repeat(2,1fr)}
  .cat-btn{padding:6px 14px;font-size:.8rem}
}

/* ===== Animation ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.link-card,.tool-card,.section{animation:fadeUp .4s ease both}
.link-card:nth-child(2){animation-delay:.05s}
.link-card:nth-child(3){animation-delay:.1s}
.link-card:nth-child(4){animation-delay:.15s}
.link-card:nth-child(5){animation-delay:.2s}

/* ===== Empty State ===== */
.empty-state{
  text-align:center;padding:40px 20px;color:var(--text2);
  display:none;grid-column:1/-1;
}
.empty-state .icon{font-size:2.5rem;margin-bottom:12px}
.empty-state.show{display:block}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">
      <span class="logo-icon">E</span>
      <span>E1nstein 导航</span>
    </a>
    <div class="header-actions">
      <button class="theme-btn" id="themeToggle" aria-label="切换主题">🌙</button>
    </div>
  </div>
</header>

<section class="hero">
  <h1><span>E1nstein</span> 导航站</h1>
  <p>精选工具 · 开发资源 · 创意灵感 — 一切尽在指尖</p>
</section>

<div class="search-wrap">
  <div class="search-box">
    <span class="icon">🔍</span>
    <input type="text" id="searchInput" placeholder="搜索链接、工具或关键词…" autocomplete="off">
    <button class="search-clear" id="searchClear">✕</button>
  </div>
</div>

<div class="container">

  <!-- Category Filter -->
  <div class="cat-filter" id="catFilter"></div>

  <!-- Navigation Links -->
  <div class="section" id="linksSection">
    <div class="section-title"><span class="emoji">🔗</span> 精选导航</div>
    <div class="link-grid" id="linkGrid"></div>
    <div class="empty-state" id="emptyState">
      <div class="icon">🔍</div>
      <p>没有找到匹配的内容，试试其他关键词</p>
    </div>
  </div>

  <!-- Tools -->
  <div class="section" id="toolsSection">
    <div class="section-title"><span class="emoji">🛠️</span> 在线工具</div>
    <div class="tools-grid" id="toolsGrid"></div>
  </div>

</div>

<footer>
  <p>© 2026 <a href="https://github.com/girlsleague" target="_blank">E1nstein</a> · 用 ❤️ 和 AI 打造</p>
</footer>

<script>
// ===== Data =====
const CATEGORIES = [
  { id: 'ai', label: '🤖 AI 工具' },
  { id: 'dev', label: '💻 开发' },
  { id: 'design', label: '🎨 设计' },
  { id: 'nav', label: '🧭 导航' },
  { id: 'news', label: '📰 资讯' },
  { id: 'tool', label: '🔧 实用工具' },
];

const LINKS = [
  // AI Tools
  { cat: 'ai', name: 'ChatGPT', desc: 'OpenAI 的对话式 AI 助手', url: 'https://chat.openai.com', icon: '🤖' },
  { cat: 'ai', name: 'Claude', desc: 'Anthropic 的安全 AI 助手', url: 'https://claude.ai', icon: '🧠' },
  { cat: 'ai', name: 'DeepSeek', desc: '国产免费大模型，推理能力出色', url: 'https://chat.deepseek.com', icon: '🇨🇳' },
  { cat: 'ai', name: 'Grok', desc: 'xAI 的实时 AI 助手', url: 'https://grok.com', icon: '⚡' },
  { cat: 'ai', name: 'Perplexity', desc: 'AI 搜索引擎，带引用来源', url: 'https://www.perplexity.ai', icon: '🔎' },
  { cat: 'ai', name: 'Curser', desc: 'AI 驱动的代码编辑器', url: 'https://www.cursor.com', icon: '📝' },
  { cat: 'ai', name: 'Hugging Face', desc: 'AI 模型社区与平台', url: 'https://huggingface.co', icon: '🤗' },
  { cat: 'ai', name: 'Midjourney', desc: 'AI 图像生成工具', url: 'https://www.midjourney.com', icon: '🎨' },

  // Dev
  { cat: 'dev', name: 'GitHub', desc: '代码托管与开发者社区', url: 'https://github.com', icon: '🐙' },
  { cat: 'dev', name: 'Vercel', desc: '前端托管与部署平台', url: 'https://vercel.com', icon: '▲' },
  { cat: 'dev', name: 'Cloudflare', desc: 'CDN、DNS、安全防护', url: 'https://cloudflare.com', icon: '☁️' },
  { cat: 'dev', name: 'Stack Overflow', desc: '开发者问答社区', url: 'https://stackoverflow.com', icon: '💬' },
  { cat: 'dev', name: 'MDN Web Docs', desc: 'Web 技术权威文档', url: 'https://developer.mozilla.org', icon: '📚' },
  { cat: 'dev', name: 'CodeSandbox', desc: '在线代码沙箱', url: 'https://codesandbox.io', icon: '📦' },
  { cat: 'dev', name: 'JSON.cn', desc: 'JSON 格式化与工具', url: 'https://www.json.cn', icon: '🔧' },
  { cat: 'dev', name: 'Regex101', desc: '正则表达式测试工具', url: 'https://regex101.com', icon: '🔤' },
  { cat: 'dev', name: 'npm', desc: 'Node.js 包管理器', url: 'https://www.npmjs.com', icon: '📦' },

  // Design
  { cat: 'design', name: 'Figma', desc: '协作式 UI 设计工具', url: 'https://www.figma.com', icon: '🖌️' },
  { cat: 'design', name: 'Coolors', desc: '配色方案生成器', url: 'https://coolors.co', icon: '🎨' },
  { cat: 'design', name: 'Dribbble', desc: '设计师社区与作品展示', url: 'https://dribbble.com', icon: '🏀' },
  { cat: 'design', name: 'Unsplash', desc: '免费高质量图库', url: 'https://unsplash.com', icon: '📷' },
  { cat: 'design', name: 'Iconify', desc: '海量图标库', url: 'https://iconify.design', icon: '✨' },
  { cat: 'design', name: 'Google Fonts', desc: '免费 Web 字体', url: 'https://fonts.google.com', icon: '🔤' },

  // Navigation
  { cat: 'nav', name: 'Product Hunt', desc: '发现新产品和工具', url: 'https://www.producthunt.com', icon: '🏆' },
  { cat: 'nav', name: 'Hacker News', desc: '黑客新闻与技术讨论', url: 'https://news.ycombinator.com', icon: '📰' },
  { cat: 'nav', name: '书签地球', desc: '中文网址导航与收藏', url: 'https://www.bookmarkearth.com', icon: '🌍' },
  { cat: 'nav', name: 'Awwwards', desc: '最佳网页设计评选', url: 'https://www.awwwards.com', icon: '🏅' },

  // News
  { cat: 'news', name: '36氪', desc: '科技与商业资讯', url: 'https://36kr.com', icon: '📡' },
  { cat: 'news', name: '机器之心', desc: 'AI 与前沿科技媒体', url: 'https://www.jiqizhixin.com', icon: '🧠' },
  { cat: 'news', name: '少数派', desc: '数字生活与效率工具', url: 'https://sspai.com', icon: '✍️' },
  { cat: 'news', name: 'Ars Technica', desc: '深度科技新闻', url: 'https://arstechnica.com', icon: '🔬' },

  // Useful Tools
  { cat: 'tool', name: 'Can I Use', desc: '浏览器兼容性查询', url: 'https://caniuse.com', icon: '✅' },
  { cat: 'tool', name: 'TinyPNG', desc: '在线图片压缩', url: 'https://tinypng.com', icon: '🖼️' },
  { cat: 'tool', name: 'Excalidraw', desc: '手绘风格白板工具', url: 'https://excalidraw.com', icon: '✏️' },
  { cat: 'tool', name: 'Remove.bg', desc: '一键去除图片背景', url: 'https://www.remove.bg', icon: '✂️' },
  { cat: 'tool', name: 'WebGradients', desc: '渐变配色大全', url: 'https://webgradients.com', icon: '🌈' },
  { cat: 'tool', name: 'Carbon', desc: '代码截图生成器', url: 'https://carbon.now.sh', icon: '📸' },
];

const TOOLS = [
  { name: '二维码生成', desc: '输入文字生成二维码图片', icon: '📱', action: 'qrcode' },
  { name: 'Base64 编解码', desc: 'Base64 编码与解码', icon: '🔐', action: 'base64' },
  { name: '颜色提取器', desc: '从图片提取配色方案', icon: '🎨', action: 'color' },
  { name: 'Markdown 预览', desc: '实时渲染 Markdown', icon: '📝', action: 'markdown' },
  { name: '时间戳转换', desc: '时间戳与日期互转', icon: '⏰', action: 'timestamp' },
  { name: '字符计数器', desc: '统计字符、单词、行数', icon: '🔢', action: 'counter' },
];

// ===== Render =====
const catFilter = document.getElementById('catFilter');
const linkGrid = document.getElementById('linkGrid');
const toolsGrid = document.getElementById('toolsGrid');
const searchInput = document.getElementById('searchInput');
const searchClear = document.getElementById('searchClear');
const emptyState = document.getElementById('emptyState');

let activeCat = 'all';

function buildCategoryFilter() {
  const allCount = LINKS.length;
  let html = `<button class="cat-btn active" data-cat="all">全部 <span class="count">${allCount}</span></button>`;
  CATEGORIES.forEach(c => {
    const count = LINKS.filter(l => l.cat === c.id).length;
    html += `<button class="cat-btn" data-cat="${c.id}">${c.label} <span class="count">${count}</span></button>`;
  });
  catFilter.innerHTML = html;

  catFilter.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      catFilter.querySelector('.cat-btn.active')?.classList.remove('active');
      btn.classList.add('active');
      activeCat = btn.dataset.cat;
      renderLinks();
    });
  });
}

function renderLinks() {
  const query = searchInput.value.toLowerCase().trim();
  const filtered = LINKS.filter(l => {
    const matchCat = activeCat === 'all' || l.cat === activeCat;
    const matchSearch = !query ||
      l.name.toLowerCase().includes(query) ||
      l.desc.toLowerCase().includes(query) ||
      l.url.toLowerCase().includes(query);
    return matchCat && matchSearch;
  });

  if (filtered.length === 0) {
    linkGrid.innerHTML = '';
    emptyState.classList.add('show');
    return;
  }

  emptyState.classList.remove('show');
  linkGrid.innerHTML = filtered.map(l => `
    <a class="link-card" href="${l.url}" target="_blank" rel="noopener noreferrer">
      <div class="link-icon">${l.icon}</div>
      <div class="link-info">
        <span class="name">${l.name}</span>
        <span class="desc">${l.desc}</span>
      </div>
      <span class="link-arrow">→</span>
    </a>
  `).join('');
}

function renderTools() {
  toolsGrid.innerHTML = TOOLS.map(t => `
    <div class="tool-card" data-action="${t.action}">
      <div class="icon">${t.icon}</div>
      <div class="name">${t.name}</div>
      <div class="desc">${t.desc}</div>
    </div>
  `).join('');

  toolsGrid.querySelectorAll('.tool-card').forEach(card => {
    card.addEventListener('click', () => {
      const action = card.dataset.action;
      // Tools open as modals — for now, open a simple prompt
      openTool(action, card.querySelector('.name').textContent);
    });
  });
}

// ===== Tool Modals (Simple) =====
function openTool(action, name) {
  // Create modal overlay
  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position:fixed;inset:0;z-index:999;
    background:rgba(0,0,0,.5);backdrop-filter:blur(4px);
    display:flex;align-items:center;justify-content:center;
    padding:20px;animation:fadeIn .2s;
  `;
  overlay.addEventListener('click', e => { if (e.target === overlay) overlay.remove(); });

  const modal = document.createElement('div');
  modal.style.cssText = `
    background:var(--surface);border-radius:16px;
    width:100%;max-width:480px;padding:28px;
    box-shadow:0 20px 60px rgba(0,0,0,.2);
    animation:scaleIn .2s ease;
  `;
  modal.innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px">
      <h3 style="font-weight:600">${name}</h3>
      <button class="modal-close" style="background:none;border:none;color:var(--text2);font-size:1.2rem;cursor:pointer">✕</button>
    </div>
    <div id="toolContent"></div>
  `;
  overlay.appendChild(modal);
  document.body.appendChild(overlay);

  modal.querySelector('.modal-close').addEventListener('click', () => overlay.remove());

  const content = modal.querySelector('#toolContent');

  switch(action) {
    case 'qrcode':
      content.innerHTML = `
        <input id="qrInput" placeholder="输入文字或链接…" style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.9rem;margin-bottom:14px">
        <div id="qrOutput" style="text-align:center;min-height:160px;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:.85rem">输入内容后点击生成</div>
        <button id="qrBtn" style="width:100%;padding:10px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;font-size:.9rem;margin-top:8px">生成二维码</button>
      `;
      setTimeout(() => {
        const btn = document.getElementById('qrBtn');
        const input = document.getElementById('qrInput');
        const output = document.getElementById('qrOutput');
        if (!btn || !input || !output) return;
        btn.addEventListener('click', () => {
          const val = input.value.trim();
          if (!val) { output.innerHTML = '<span style="color:#ef4444">请输入内容</span>'; return; }
          output.innerHTML = `<img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(val)}" alt="QR Code" style="border-radius:8px;max-width:200px">`;
        });
        input.addEventListener('keydown', e => { if (e.key === 'Enter') btn.click(); });
      }, 50);
      break;
    case 'base64':
      content.innerHTML = `
        <textarea id="b64Input" placeholder="输入要编码/解码的文本…" style="width:100%;min-height:100px;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.85rem;resize:vertical;margin-bottom:10px"></textarea>
        <div style="display:flex;gap:8px;margin-bottom:10px">
          <button id="b64Encode" style="flex:1;padding:8px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-weight:500;cursor:pointer">编码 →</button>
          <button id="b64Decode" style="flex:1;padding:8px;border:none;border-radius:8px;background:var(--surface2);color:var(--text);font-weight:500;cursor:pointer">← 解码</button>
        </div>
        <textarea id="b64Output" readonly placeholder="结果…" style="width:100%;min-height:80px;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.85rem;resize:vertical"></textarea>
      `;
      setTimeout(() => {
        const enc = document.getElementById('b64Encode');
        const dec = document.getElementById('b64Decode');
        const inp = document.getElementById('b64Input');
        const out = document.getElementById('b64Output');
        if (!enc || !dec || !inp || !out) return;
        enc.addEventListener('click', () => { try { out.value = btoa(inp.value); } catch(e) { out.value = '编码失败: ' + e.message; } });
        dec.addEventListener('click', () => { try { out.value = atob(inp.value); } catch(e) { out.value = '解码失败: ' + e.message; } });
      }, 50);
      break;
    case 'color':
      content.innerHTML = `
        <p style="color:var(--text2);font-size:.85rem;margin-bottom:14px">点击色块复制颜色值</p>
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:8px" id="colorPalette">
          ${['#6366f1','#8b5cf6','#ec4899','#ef4444','#f59e0b','#10b981','#06b6d4','#3b82f6','#1e293b','#64748b'].map(c => `
            <div style="background:${c};aspect-ratio:1;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:#fff;font-weight:600;text-shadow:0 1px 2px rgba(0,0,0,.3);transition:transform .15s" data-color="${c}" title="点击复制 ${c}">${c}</div>
          `).join('')}
        </div>
        <input id="customColor" type="color" value="#6366f1" style="width:100%;height:40px;border:none;border-radius:8px;margin-top:10px;cursor:pointer">
        <p style="text-align:center;color:var(--text2);font-size:.78rem;margin-top:6px">或选择自定义颜色</p>
      `;
      setTimeout(() => {
        document.querySelectorAll('#colorPalette > div').forEach(el => {
          el.addEventListener('click', async () => {
            const color = el.dataset.color;
            try { await navigator.clipboard.writeText(color); el.textContent = '✓'; setTimeout(() => { el.textContent = color; }, 800); } catch(e) {}
          });
        });
      }, 50);
      break;
    case 'markdown':
      content.innerHTML = `
        <div style="display:flex;gap:0;margin-bottom:0">
          <textarea id="mdInput" placeholder="输入 Markdown…" style="flex:1;min-height:200px;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px 0 0 8px;background:var(--surface2);color:var(--text);font-size:.85rem;resize:vertical;font-family:var(--mono)"></textarea>
          <div id="mdPreview" style="flex:1;min-height:200px;padding:10px 14px;border:1.5px solid var(--border);border-left:none;border-radius:0 8px 8px 0;overflow-y:auto;font-size:.85rem;line-height:1.6;background:var(--surface)"></div>
        </div>
      `;
      setTimeout(() => {
        const inp = document.getElementById('mdInput');
        const prev = document.getElementById('mdPreview');
        if (!inp || !prev) return;
        inp.addEventListener('input', () => {
          const md = inp.value;
          let html = md
            .replace(/### (.+)/g, '<h3>$1</h3>')
            .replace(/## (.+)/g, '<h2>$1</h2>')
            .replace(/# (.+)/g, '<h1>$1</h1>')
            .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
            .replace(/\*(.+?)\*/g, '<em>$1</em>')
            .replace(/`(.+?)`/g, '<code style="background:var(--surface2);padding:2px 6px;border-radius:4px;font-size:.8em">$1</code>')
            .replace(/^- (.+)/gm, '<li>$1</li>')
            .replace(/\n\n/g, '</p><p>')
            .replace(/\n/g, '<br>');
          prev.innerHTML = md.trim() ? `<p>${html}</p>` : '<span style="color:var(--text2)">预览区域</span>';
        });
      }, 50);
      break;
    case 'timestamp':
      content.innerHTML = `
        <div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap">
          <div style="flex:1;min-width:180px">
            <label style="display:block;font-size:.8rem;color:var(--text2);margin-bottom:4px">时间戳 → 日期</label>
            <input id="tsInput" type="number" placeholder="输入时间戳（秒）" style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.85rem">
            <button id="tsToDate" style="width:100%;padding:8px;border:none;border-radius:8px;background:var(--accent);color:#fff;font-weight:500;cursor:pointer;margin-top:6px">转换</button>
            <div id="tsResult1" style="margin-top:6px;font-size:.82rem;color:var(--text2);min-height:24px"></div>
          </div>
          <div style="flex:1;min-width:180px">
            <label style="display:block;font-size:.8rem;color:var(--text2);margin-bottom:4px">日期 → 时间戳</label>
            <input id="dateInput" type="datetime-local" style="width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.85rem">
            <button id="dateToTs" style="width:100%;padding:8px;border:none;border-radius:8px;background:var(--surface2);color:var(--text);font-weight:500;cursor:pointer;margin-top:6px">转换</button>
            <div id="tsResult2" style="margin-top:6px;font-size:.82rem;color:var(--text2);min-height:24px"></div>
          </div>
        </div>
        <div style="text-align:center;padding:10px;background:var(--surface2);border-radius:8px;font-size:.82rem;color:var(--text2)">
          当前时间戳: <strong id="nowTs" style="color:var(--accent)"></strong>
        </div>
      `;
      setTimeout(() => {
        const n = document.getElementById('nowTs');
        if (n) n.textContent = Math.floor(Date.now() / 1000);
        const tsBtn = document.getElementById('tsToDate');
        const tsInp = document.getElementById('tsInput');
        const r1 = document.getElementById('tsResult1');
        if (tsBtn && tsInp && r1) {
          tsBtn.addEventListener('click', () => {
            const v = parseInt(tsInp.value);
            if (isNaN(v)) { r1.textContent = '请输入有效数字'; return; }
            r1.textContent = new Date(v * 1000).toLocaleString('zh-CN');
          });
        }
        const dtBtn = document.getElementById('dateToTs');
        const dtInp = document.getElementById('dateInput');
        const r2 = document.getElementById('tsResult2');
        if (dtBtn && dtInp && r2) {
          dtBtn.addEventListener('click', () => {
            if (!dtInp.value) { r2.textContent = '请选择日期'; return; }
            r2.textContent = Math.floor(new Date(dtInp.value).getTime() / 1000) + ' 秒';
          });
        }
      }, 50);
      break;
    case 'counter':
      content.innerHTML = `
        <textarea id="countInput" placeholder="输入文字…" style="width:100%;min-height:150px;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;background:var(--surface2);color:var(--text);font-size:.85rem;resize:vertical;margin-bottom:12px"></textarea>
        <div id="countStats" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
          <div style="text-align:center;padding:14px;background:var(--surface2);border-radius:8px"><div style="font-size:1.4rem;font-weight:700;color:var(--accent)" id="charCount">0</div><div style="font-size:.75rem;color:var(--text2)">字符</div></div>
          <div style="text-align:center;padding:14px;background:var(--surface2);border-radius:8px"><div style="font-size:1.4rem;font-weight:700;color:var(--accent)" id="wordCount">0</div><div style="font-size:.75rem;color:var(--text2)">单词</div></div>
          <div style="text-align:center;padding:14px;background:var(--surface2);border-radius:8px"><div style="font-size:1.4rem;font-weight:700;color:var(--accent)" id="lineCount">0</div><div style="font-size:.75rem;color:var(--text2)">行数</div></div>
          <div style="text-align:center;padding:14px;background:var(--surface2);border-radius:8px"><div style="font-size:1.4rem;font-weight:700;color:var(--accent)" id="cnCount">0</div><div style="font-size:.75rem;color:var(--text2)">中文字符</div></div>
        </div>
      `;
      setTimeout(() => {
        const inp = document.getElementById('countInput');
        if (!inp) return;
        inp.addEventListener('input', () => {
          const t = inp.value;
          document.getElementById('charCount').textContent = t.length;
          document.getElementById('wordCount').textContent = t.trim() ? t.trim().split(/\s+/).length : 0;
          document.getElementById('lineCount').textContent = t ? t.split('\n').length : 0;
          document.getElementById('cnCount').textContent = (t.match(/[一-鿿]/g) || []).length;
        });
      }, 50);
      break;
  }
}

// ===== Search =====
searchInput.addEventListener('input', () => {
  searchClear.classList.toggle('visible', searchInput.value.length > 0);
  renderLinks();
});

searchClear.addEventListener('click', () => {
  searchInput.value = '';
  searchClear.classList.remove('visible');
  renderLinks();
  searchInput.focus();
});

// ===== Theme Toggle =====
const themeToggle = document.getElementById('themeToggle');
const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
const savedTheme = localStorage.getItem('theme');

if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
  document.documentElement.classList.add('dark');
  themeToggle.textContent = '☀️';
}

themeToggle.addEventListener('click', () => {
  const isDark = document.documentElement.classList.toggle('dark');
  themeToggle.textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
});

// ===== Init =====
buildCategoryFilter();
renderLinks();
renderTools();
</script>
</body>
</html>
